{% extends "layout.html" %}
{% block title %}Giriş Yap / Kayıt Ol{% endblock %}

{% block content %}
<div class="flex flex-col items-center justify-center min-h-[70vh] animate-in fade-in zoom-in duration-500">
    <div class="glass p-10 rounded-[3rem] w-full max-w-md shadow-2xl border border-white/10">
        
        <!-- Tabs -->
        <div class="flex mb-10 bg-slate-900/50 p-1.5 rounded-2xl border border-white/5">
            <button id="loginTab" class="flex-1 py-3 rounded-xl bg-emerald-500 text-white font-black text-xs uppercase tracking-widest shadow-lg shadow-emerald-500/20 transition-all">Giriş</button>
            <button id="registerTab" class="flex-1 py-3 rounded-xl text-slate-500 font-black text-xs uppercase tracking-widest hover:text-white transition-all">Kayıt</button>
        </div>

        <!-- Login Form -->
        <form id="loginForm" class="space-y-6">
            <div class="space-y-2">
                <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest ml-1">E-POSTA</label>
                <input type="email" name="email" required class="w-full bg-slate-950/50 border border-slate-800 rounded-2xl p-4 text-sm focus:border-emerald-500 focus:outline-none transition" placeholder="mail@example.com">
            </div>
            <div class="space-y-2">
                <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest ml-1">ŞİFRE</label>
                <input type="password" name="password" required class="w-full bg-slate-950/50 border border-slate-800 rounded-2xl p-4 text-sm focus:border-emerald-500 focus:outline-none transition" placeholder="••••••••">
            </div>
            <button type="submit" class="w-full bg-emerald-500 hover:bg-emerald-400 text-white font-black py-4 rounded-2xl transition shadow-lg shadow-emerald-500/20 uppercase tracking-widest text-xs mt-2">GİRİŞ YAP</button>
        </form>

        <!-- Register Form -->
        <form id="registerForm" class="space-y-5 hidden">
            <input type="text" name="username" required class="w-full bg-slate-950/50 border border-slate-800 rounded-2xl p-4 text-sm focus:border-emerald-500 transition" placeholder="Kullanıcı Adı">
            <input type="email" name="email" required class="w-full bg-slate-950/50 border border-slate-800 rounded-2xl p-4 text-sm focus:border-emerald-500 transition" placeholder="E-posta">
            <div class="grid grid-cols-2 gap-4">
                <input type="number" name="age" required class="bg-slate-950/50 border border-slate-800 rounded-2xl p-4 text-sm focus:border-emerald-500 transition" placeholder="Yaş">
                <input type="number" name="height" required class="bg-slate-950/50 border border-slate-800 rounded-2xl p-4 text-sm focus:border-emerald-500 transition" placeholder="Boy (cm)">
            </div>
            <div class="grid grid-cols-2 gap-4">
                <input type="number" name="weight" required class="bg-slate-950/50 border border-slate-800 rounded-2xl p-4 text-sm focus:border-emerald-500 transition" placeholder="Kilo (kg)">
                <select name="gender" class="bg-slate-950/50 border border-slate-800 rounded-2xl p-4 text-sm text-slate-400 focus:border-emerald-500 transition">
                    <option value="male">Erkek</option>
                    <option value="female">Kadın</option>
                </select>
            </div>
            <input type="password" name="password" required class="w-full bg-slate-950/50 border border-slate-800 rounded-2xl p-4 text-sm focus:border-emerald-500 transition" placeholder="Şifre">
            <button type="submit" class="w-full bg-emerald-500 hover:bg-emerald-400 text-white font-black py-4 rounded-2xl transition shadow-lg shadow-emerald-500/20 uppercase tracking-widest text-xs">HESAP OLUŞTUR</button>
        </form>

        <p id="authMessage" class="mt-6 text-center text-xs font-bold hidden"></p>
    </div>
</div>

<script>
    const loginTab = document.getElementById('loginTab');
    const registerTab = document.getElementById('registerTab');
    const loginForm = document.getElementById('loginForm');
    const registerForm = document.getElementById('registerForm');
    const authMessage = document.getElementById('authMessage');

    loginTab.onclick = () => {
        loginForm.classList.remove('hidden'); registerForm.classList.add('hidden');
        loginTab.className = "flex-1 py-3 rounded-xl bg-emerald-500 text-white font-black text-xs uppercase tracking-widest shadow-lg shadow-emerald-500/20 transition-all";
        registerTab.className = "flex-1 py-3 rounded-xl text-slate-500 font-black text-xs uppercase tracking-widest hover:text-white transition-all";
    };

    registerTab.onclick = () => {
        registerForm.classList.remove('hidden'); loginForm.classList.add('hidden');
        registerTab.className = "flex-1 py-3 rounded-xl bg-emerald-500 text-white font-black text-xs uppercase tracking-widest shadow-lg shadow-emerald-500/20 transition-all";
        loginTab.className = "flex-1 py-3 rounded-xl text-slate-500 font-black text-xs uppercase tracking-widest hover:text-white transition-all";
    };

    // Handle Login
    loginForm.onsubmit = async (e) => {
        e.preventDefault();
        const data = Object.fromEntries(new FormData(loginForm));
        try {
            const res = await fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            const result = await res.json();
            if (res.ok) {
                localStorage.setItem('token', result.auth_token);
                window.location.href = '/';
            } else showMessage(result.message, 'text-red-400');
        } catch (err) { showMessage('Bağlantı hatası!', 'text-red-400'); }
    };

    // Handle Register
    registerForm.onsubmit = async (e) => {
        e.preventDefault();
        const data = Object.fromEntries(new FormData(registerForm));
        ['age', 'height', 'weight'].forEach(k => data[k] = Number(data[k]));
        
        try {
            const res = await fetch('/api/auth/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            const result = await res.json();
            if (res.ok) {
                showMessage('Kayıt başarılı! Şimdi giriş yapabilirsiniz.', 'text-emerald-400');
                loginTab.click();
            } else showMessage(result.message, 'text-red-400');
        } catch (err) { showMessage('Bağlantı hatası!', 'text-red-400'); }
    };

    function showMessage(text, color) {
        authMessage.innerText = text;
        authMessage.className = `mt-6 text-center text-xs font-bold ${color}`;
        authMessage.classList.remove('hidden');
    }
</script>
{% endblock %}
