<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NutriTrack AI - {% block title %}{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#10b981',
                        secondary: '#3b82f6',
                        accent: '#6366f1',
                    }
                }
            }
        }
    </script>
    <style>
        :root {
            --glass-bg: rgba(15, 23, 42, 0.75);
            --glass-border: rgba(255, 255, 255, 0.1);
        }
        body { 
            font-family: 'Inter', sans-serif; 
            background: radial-gradient(circle at top left, #0f172a, #020617);
            background-attachment: fixed;
            color: #f8fafc;
        }
        .glass { 
            background: var(--glass-bg); 
            backdrop-filter: blur(20px); 
            border: 1px solid var(--glass-border);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.4);
        }
        .text-gradient {
            background: linear-gradient(to right, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .card-hover { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .card-hover:hover { transform: translateY(-5px); border-color: rgba(16, 185, 129, 0.3); }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen">
    <!-- Splash Screen -->
    <div id="splash" class="fixed inset-0 z-[100] flex items-center justify-center bg-[#020617]">
        <div class="relative flex flex-col items-center">
            <!-- Dönen dış halka -->
            <div class="absolute h-24 w-24 border-t-4 border-emerald-500 rounded-full animate-spin"></div>
            <!-- Logo -->
            <div class="h-20 w-20 bg-emerald-900/50 backdrop-blur-sm rounded-3xl flex items-center justify-center shadow-2xl shadow-emerald-500/20 animate-bounce">
                <i class="fa-solid fa-leaf text-emerald-400 text-4xl"></i>
            </div>
            <h1 class="mt-8 text-2xl font-black text-white tracking-widest uppercase animate-pulse">NutriTrack AI</h1>
        </div>
    </div>

    <nav class="glass sticky top-0 z-50 p-4 border-b border-white/5">
        <div class="container mx-auto flex justify-between items-center px-2 md:px-4">
            <a href="/" class="flex items-center gap-3 group">
                <div class="h-10 w-10 bg-emerald-500 rounded-xl flex items-center justify-center shadow-lg shadow-emerald-500/30 group-hover:scale-110 transition-transform duration-300">
                    <i class="fa-solid fa-leaf text-white text-xl"></i>
                </div>
                <h1 class="text-xl md:text-2xl font-black tracking-tighter text-white hidden md:block">NutriTrack <span class="text-emerald-400">AI</span></h1>
            </a>
            
            <div class="flex items-center gap-4 md:gap-8">
                <div id="guestLinks" class="space-x-2 md:space-x-4">
                    <a href="/auth" class="text-[11px] md:text-sm font-bold text-slate-400 hover:text-white transition">Giriş</a>
                    <a href="/auth" class="bg-emerald-600 hover:bg-emerald-700 px-4 md:px-6 py-2 rounded-xl text-white font-black text-[10px] md:text-xs uppercase tracking-widest transition shadow-lg shadow-emerald-500/20">Kayıt Ol</a>
                </div>
                <div id="userLinks" class="hidden flex items-center gap-3 md:gap-8">
                    <a href="/dashboard" class="text-xs md:text-sm font-bold hover:text-emerald-400 transition flex items-center gap-2">
                        <i class="fa-solid fa-house-chimney text-[10px] opacity-50"></i> <span class="hidden md:inline">Dashboard</span>
                    </a>
                    <a href="/settings" class="text-xs md:text-sm font-bold text-slate-400 hover:text-emerald-400 transition flex items-center gap-2">
                        <i class="fa-solid fa-sliders text-[10px] opacity-50"></i> <span class="hidden md:inline">Ayarlar</span>
                    </a>
                    <button onclick="logout()" class="px-3 md:px-5 py-2 rounded-xl bg-red-500/10 text-red-400 text-[10px] font-black border border-red-500/20 hover:bg-red-500 hover:text-white transition-all duration-300 uppercase tracking-widest">
                        Çıkış
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <script>
        // Splash Screen
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('splash').classList.add('opacity-0', 'pointer-events-none');
                setTimeout(() => document.getElementById('splash').remove(), 500);
            }, 800);
        });

        const navToken = localStorage.getItem('token');
        if (navToken) {
            document.getElementById('guestLinks').classList.add('hidden');
            document.getElementById('userLinks').classList.remove('hidden');
        }

        function logout() {
            localStorage.removeItem('token');
            window.location.href = '/';
        }
    </script>

    <main class="container mx-auto px-4 py-6">
        {% block content %}{% endblock %}
    </main>

    <!-- Global JS -->
    <script src="{{ url_for('static', filename='js/modules/core.js') }}"></script>
    <script src="{{ url_for('static', filename='js/modules/nutrition.js') }}"></script>
    <script src="{{ url_for('static', filename='js/modules/fitness.js') }}"></script>
    <script src="{{ url_for('static', filename='js/modules/ui.js') }}"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
