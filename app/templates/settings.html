{% extends "layout.html" %}
{% block title %}Ayarlar{% endblock %}

{% block content %}
<div class="max-w-4xl mx-auto px-4 py-8">
    <div class="flex flex-col md:flex-row items-start md:items-center justify-between mb-8 gap-4">
        <h1 class="text-2xl md:text-3xl font-extrabold bg-gradient-to-r from-white to-slate-400 bg-clip-text text-transparent">
            <i class="fa-solid fa-user-gear mr-3 text-emerald-400"></i>Profil Ayarları
        </h1>
        <a href="/dashboard" class="text-sm text-slate-400 hover:text-emerald-400 transition">
            <i class="fa-solid fa-arrow-left mr-2"></i>Dashboard'a Dön
        </a>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
        <!-- Sidebar Navigation -->
        <div class="grid grid-cols-2 md:grid-cols-1 gap-2">
            <button class="w-full text-left p-4 rounded-xl bg-emerald-500/10 text-emerald-400 border border-emerald-500/20 font-bold text-xs md:text-sm">
                <i class="fa-solid fa-user-pen mr-2"></i> Profil
            </button>
            <button class="w-full text-left p-4 rounded-xl hover:bg-white/5 text-slate-400 transition text-xs md:text-sm">
                <i class="fa-solid fa-shield-halved mr-2"></i> Güvenlik
            </button>
        </div>

        <!-- Main Settings Form -->
        <div class="md:col-span-2 space-y-8">
            <div class="glass p-8 rounded-3xl border border-white/5 shadow-2xl">
                <h3 class="text-xl font-bold mb-6 text-white border-b border-white/5 pb-4">Vücut Bilgileri ve Hedefler</h3>
                
                <form id="settingsForm" class="space-y-6">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="space-y-2">
                            <label class="block text-sm font-bold text-slate-400 uppercase tracking-wider">Yaş</label>
                            <input type="number" name="age" required 
                                class="w-full bg-slate-800/50 border border-slate-700 rounded-xl p-3 focus:outline-none focus:border-emerald-500 transition">
                        </div>
                        <div class="space-y-2">
                            <label class="block text-sm font-bold text-slate-400 uppercase tracking-wider">Cinsiyet</label>
                            <select name="gender" class="w-full bg-slate-800/50 border border-slate-700 rounded-xl p-3 focus:outline-none focus:border-emerald-500 transition">
                                <option value="male">Erkek</option>
                                <option value="female">Kadın</option>
                            </select>
                        </div>
                        <div class="space-y-2">
                            <label class="block text-sm font-bold text-slate-400 uppercase tracking-wider">Boy (cm)</label>
                            <input type="number" name="height" required 
                                class="w-full bg-slate-800/50 border border-slate-700 rounded-xl p-3 focus:outline-none focus:border-emerald-500 transition">
                        </div>
                        <div class="space-y-2">
                            <label class="block text-sm font-bold text-slate-400 uppercase tracking-wider">Mevcut Kilo (kg)</label>
                            <input type="number" name="weight" step="0.1" required 
                                class="w-full bg-slate-800/50 border border-slate-700 rounded-xl p-3 focus:outline-none focus:border-emerald-500 transition">
                        </div>
                    </div>

                    <div class="space-y-2">
                        <label class="block text-sm font-bold text-slate-400 uppercase tracking-wider">Diyet Programı / Hedef</label>
                        <select name="goal" class="w-full bg-slate-800/50 border border-slate-700 rounded-xl p-3 focus:outline-none focus:border-emerald-500 transition">
                            <option value="fat_loss">Yağ Yakımı (Definisyon)</option>
                            <option value="hypertrophy">Kas Gelişimi (Bulking)</option>
                            <option value="maintenance">Kilo Koruma</option>
                        </select>
                        <p class="text-[10px] text-slate-500 mt-1">Hedefinize göre günlük kalori ve makrolarınız otomatik hesaplanır.</p>
                    </div>

                    <div class="space-y-2">
                        <label class="block text-sm font-bold text-slate-400 uppercase tracking-wider">Aktivite Seviyesi</label>
                        <select name="activity_level" class="w-full bg-slate-800/50 border border-slate-700 rounded-xl p-3 focus:outline-none focus:border-emerald-500 transition">
                            <option value="sedentary">Hareketsiz (Ofis işi)</option>
                            <option value="lightly_active">Hafif Aktif (Haftada 1-3 gün spor)</option>
                            <option value="moderately_active">Orta Aktif (Haftada 3-5 gün spor)</option>
                            <option value="very_active">Çok Aktif (Haftada 6-7 gün ağır spor)</option>
                        </select>
                    </div>

                    <div class="pt-4">
                        <button type="submit" class="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-black py-4 rounded-xl transition shadow-lg shadow-emerald-500/20">
                            AYARLARI KAYDET VE HEDEFLERİ GÜNCELLE
                        </button>
                    </div>
                </form>
            </div>

            <!-- Diet Plan Info Display -->
            <div id="targetSummary" class="glass p-8 rounded-3xl border border-blue-500/10 hidden">
                <h4 class="text-lg font-bold mb-4 text-blue-400">Yeni Günlük Hedefleriniz</h4>
                <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                    <div class="text-center p-3 bg-white/5 rounded-xl">
                        <p class="text-[10px] text-slate-500 uppercase">KALORİ</p>
                        <p id="targetCal" class="text-xl font-bold text-white">-</p>
                    </div>
                    <div class="text-center p-3 bg-white/5 rounded-xl">
                        <p class="text-[10px] text-slate-500 uppercase">PROTEİN</p>
                        <p id="targetPro" class="text-xl font-bold text-blue-400">-</p>
                    </div>
                    <div class="text-center p-3 bg-white/5 rounded-xl">
                        <p class="text-[10px] text-slate-500 uppercase">KARB</p>
                        <p id="targetCarb" class="text-xl font-bold text-amber-400">-</p>
                    </div>
                    <div class="text-center p-3 bg-white/5 rounded-xl">
                        <p class="text-[10px] text-slate-500 uppercase">YAĞ</p>
                        <p id="targetFat" class="text-xl font-bold text-rose-400">-</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const token = localStorage.getItem('token');
    if (!token) window.location.href = '/auth';

    async function loadSettings() {
        try {
            const res = await fetch('/api/auth/profile', {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const data = await res.json();
            if (res.ok) {
                const form = document.getElementById('settingsForm');
                form.age.value = data.age;
                form.gender.value = data.gender;
                form.height.value = data.height;
                form.weight.value = data.weight;
                form.goal.value = data.goal;
                form.activity_level.value = data.activity_level;

                // Update summary
                document.getElementById('targetSummary').classList.remove('hidden');
                document.getElementById('targetCal').innerText = data.targets.calories;
                document.getElementById('targetPro').innerText = data.targets.protein + 'g';
                document.getElementById('targetCarb').innerText = data.targets.carbs + 'g';
                document.getElementById('targetFat').innerText = data.targets.fats + 'g';
            }
        } catch (err) { console.error('Settings load failed'); }
    }

    document.getElementById('settingsForm').onsubmit = async (e) => {
        e.preventDefault();
        const formData = new FormData(e.target);
        const data = Object.fromEntries(formData);
        
        // Convert types
        ['age', 'height', 'weight'].forEach(k => data[k] = Number(data[k]));

        try {
            const res = await fetch('/api/auth/profile', {
                method: 'PUT',
                headers: { 
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify(data)
            });
            if (res.ok) {
                alert('Ayarlar başarıyla güncellendi!');
                loadSettings();
            }
        } catch (err) { alert('Güncelleme sırasında bir hata oluştu.'); }
    };

    loadSettings();
</script>
{% endblock %}
